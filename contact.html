<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons (optional) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MyBrand</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTACT HERO SECTION WITH BACKGROUND IMAGE -->
<section style="background: url('https://images.pexels.com/photos/3184298/pexels-photo-3184298.jpeg?auto=compress&cs=tinysrgb&w=1200') no-repeat center center; 
                background-size: cover; 
                position: relative; 
                min-height: 100vh;" class="d-flex align-items-center">
  
  <!-- Dark overlay for readability -->
  <div style="position:absolute; top:0; left:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5);"></div>

  <!-- Contact Form Container -->
  <div class="container position-relative text-white" style="z-index:2;">
    <div class="row justify-content-center">
      
      <!-- Form Card -->
      <div class="col-lg-6">
        <div class="card p-4 shadow bg-light text-dark">
          <h2 class="text-center mb-4">Contact Us</h2>
          <form>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" placeholder="Enter first name">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Enter last name">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Email address</label>
              <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="4" placeholder="Write your message"></textarea>
            </div>

            <div class="text-center">
              <button type="submit" class="btn btn-primary px-5">Send Message</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Optional Contact Info Column -->
      <div class="col-lg-4 mt-4 mt-lg-0 text-center text-lg-start">
        <h4 class="fw-bold">Contact Info</h4>
        <p class="mb-1"><i class="bi bi-geo-alt-fill me-2"></i>123 Main Street, City, Country</p>
        <p class="mb-1"><i class="bi bi-telephone-fill me-2"></i>+123 456 7890</p>
        <p class="mb-1"><i class="bi bi-envelope-fill me-2"></i>contact@mybrand.com</p>
        <p class="mb-0"><i class="bi bi-clock-fill me-2"></i>Mon-Fri 9:00 AM - 6:00 PM</p>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
  <div class="container">
    <p class="mb-1">© 2026 MyBrand. All Rights Reserved.</p>
    <small class="text-muted">Built with Bootstrap 5</small>
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
